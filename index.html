<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendByte | Finance, but Fluid</title>
    <link rel="icon" type="image/png" href="logo.jpeg" />
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        obsidian: '#000000',
                        neonPurple: '#8B5CF6',
                        neonGreen: '#10B981',
                        surface: '#0A0A0A'
                    },
                    animation: {
                        pulseSlow: 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(139, 92, 246, 0.1);
        }

        .liquid-btn {
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .liquid-btn::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: #8B5CF6;
            z-index: -1;
            transition: height 0.6s cubic-bezier(0.76, 0, 0.24, 1);
            border-radius: 50% 50% 0 0;
        }

        .liquid-btn:hover::before {
            height: 200%;
            border-radius: 0;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #8B5CF6;
        }
    </style>

    <!-- Dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <!-- Lenis for Smooth Scroll -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.39/dist/lenis.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;
        const { motion, useScroll, useTransform, useSpring, AnimatePresence } = window.Motion;

        // Initialize Lenis Smooth Scroll
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            smooth: true
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // --- Components ---

        const Nav = () => (
            <motion.nav
                initial={{ y: -100 }}
                animate={{ y: 0 }}
                transition={{ type: "spring", stiffness: 100, damping: 20, delay: 0.2 }}
                className="fixed top-0 w-full z-50 glass border-b border-white/5 py-4 px-6 md:px-8 flex justify-between items-center"
            >
                <div className="flex items-center gap-3">
                    <div className="relative w-10 h-10 rounded-xl group">
                        <div className="absolute inset-0 bg-neonPurple rounded-xl blur-md opacity-60 animate-pulseSlow"></div>
                        <img src="logo.jpeg" alt="SpendByte Logo" width="40" height="40" className="relative w-full h-full rounded-xl object-cover z-10 transition-transform group-hover:scale-110" />
                    </div>
                    <span className="font-bold text-xl tracking-tight">SpendByte</span>
                </div>
                <a href="#download" className="px-5 py-2 rounded-full text-sm font-semibold bg-white/10 hover:bg-white/20 transition-colors border border-white/10 flex items-center gap-2">
                    Get App <i data-lucide="arrow-right" className="w-4 h-4"></i>
                </a>
            </motion.nav>
        );

        const Hero = () => {
            const { scrollY } = useScroll();
            const y = useTransform(scrollY, [0, 500], [0, 150]);

            const textVariants = {
                hidden: { opacity: 0, y: 50 },
                visible: { opacity: 1, y: 0, transition: { staggerChildren: 0.1, delayChildren: 0.3 } }
            };

            return (
                <section id="home" className="relative min-h-[110vh] flex items-center justify-center pt-32 pb-32 px-6 md:px-8 overflow-hidden">
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-neonPurple/20 rounded-full blur-[120px] pointer-events-none" />

                    {/* Antigravity Floating Logo */}
                    <motion.div 
                        animate={{ 
                            y: [0, -40, 0],
                            rotateX: [0, 15, -10, 0],
                            rotateY: [0, -15, 10, 0],
                        }}
                        transition={{ duration: 10, repeat: Infinity, ease: "easeInOut" }}
                        className="absolute hidden lg:flex top-32 left-[38%] w-32 h-32 z-0 pointer-events-none"
                    >
                        <div className="w-full h-full rounded-[2rem] glass p-1 shadow-[0_0_40px_rgba(139,92,246,0.5)] border border-white/10 relative">
                            <div className="absolute inset-0 bg-neonPurple/40 blur-xl rounded-full"></div>
                            <img src="./image_14.png" alt="SpendByte Logo" width="128" height="128" className="w-full h-full rounded-[1.75rem] object-cover relative z-10 opacity-90 shadow-[0_0_20px_rgba(255,255,255,0.1)]" />
                        </div>
                    </motion.div>
                    <div className="w-full max-w-7xl grid grid-cols-1 lg:grid-cols-2 gap-16 lg:gap-12 items-center z-10">
                        <motion.div variants={textVariants} initial="hidden" animate="visible" className="space-y-8 text-center lg:text-left">
                            <motion.h1 variants={textVariants} className="text-5xl md:text-6xl lg:text-[5.5rem] font-black tracking-tighter leading-[1.05]">
                                Finance, <br />
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-neonPurple to-purple-300">
                                    but Fluid.
                                </span>
                            </motion.h1>
                            <motion.p variants={textVariants} className="text-xl text-gray-400 max-w-md mx-auto lg:mx-0 font-medium leading-relaxed">
                                Your journey to better finances starts here. The most beautifully crafted expense tracker is now available.
                            </motion.p>
                            <motion.div variants={textVariants} className="flex flex-col items-center gap-4 mt-8 lg:flex-row lg:justify-start w-full">
                                <a href="#download" className="liquid-btn px-8 py-4 w-full lg:w-auto rounded-full bg-white/5 border border-neonPurple/50 font-semibold text-lg hover:border-neonPurple transition-all flex items-center justify-center gap-2">
                                    Download APK
                                </a>
                                <a href="#features" className="px-8 py-4 w-full lg:w-auto text-center rounded-full glass font-medium text-gray-300 hover:text-white transition-colors">
                                    Explore
                                </a>
                            </motion.div>
                        </motion.div>

                        <motion.div
                            initial={{ opacity: 0, scale: 0.8, rotateY: 25 }}
                            animate={{ opacity: 1, scale: 1, rotateY: -15, rotateX: 5 }}
                            transition={{ type: "spring", stiffness: 80, damping: 20, delay: 0.8 }}
                            whileHover={{ rotateY: 0, rotateX: 0, scale: 1.02 }}
                            style={{ y }}
                            className="relative mx-auto w-[330px] h-[700px] rounded-[3rem] border-4 border-gray-800 bg-surface p-4 shadow-[0_0_80px_rgba(139,92,246,0.15)]"
                        >
                            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-36 h-7 bg-gray-800 rounded-b-3xl z-20"></div>

                            <div className="w-full h-full rounded-[2.5rem] overflow-hidden bg-black pb-6 flex flex-col relative mask-image-bottom">
                                {/* App Header */}
                                <div className="pt-10 px-6 flex justify-between items-center text-sm font-semibold text-white">
                                    <span className="text-2xl font-bold">SpendByte</span>
                                </div>
                                <div className="px-6 top-1 text-xs text-gray-500">Sunday, Mar 22, 2026</div>

                                {/* Dashboard Stats */}
                                <div className="grid grid-cols-2 gap-3 px-4 mt-6">
                                    <div className="bg-[#111] rounded-2xl p-4 border border-white/5">
                                        <div className="flex items-center gap-2 mb-2">
                                            <div className="w-6 h-6 rounded bg-neonPurple/20 flex justify-center items-center"><i data-lucide="wallet" className="w-3 h-3 text-neonPurple"></i></div>
                                            <span className="text-xs text-gray-400">Balance</span>
                                        </div>
                                        <div className="font-bold text-lg">₹0.00</div>
                                    </div>
                                    <div className="bg-[#111] rounded-2xl p-4 border border-white/5">
                                        <div className="flex items-center gap-2 mb-2">
                                            <div className="w-6 h-6 rounded bg-neonGreen/20 flex justify-center items-center"><i data-lucide="piggy-bank" className="w-3 h-3 text-neonGreen"></i></div>
                                            <span className="text-xs text-gray-400">Net Savings</span>
                                        </div>
                                        <div className="font-bold text-lg">₹0.00</div>
                                    </div>
                                    <div className="bg-[#111] rounded-2xl p-4 border border-white/5">
                                        <div className="flex items-center gap-2 mb-2">
                                            <div className="w-6 h-6 rounded flex justify-center items-center"><i data-lucide="arrow-down-left" className="w-4 h-4 text-neonGreen"></i></div>
                                            <span className="text-xs text-gray-400">Income</span>
                                        </div>
                                        <div className="font-bold text-lg">₹0</div>
                                    </div>
                                    <div className="bg-[#111] rounded-2xl p-4 border border-white/5">
                                        <div className="flex items-center gap-2 mb-2">
                                            <div className="w-6 h-6 rounded flex justify-center items-center"><i data-lucide="arrow-up-right" className="w-4 h-4 text-red-400"></i></div>
                                            <span className="text-xs text-gray-400">Expenses</span>
                                        </div>
                                        <div className="font-bold text-lg">₹0</div>
                                    </div>
                                </div>

                                <div className="px-4 mt-4">
                                    <div className="bg-[#111] rounded-2xl p-4 border border-white/5 flex flex-col gap-2">
                                        <div className="flex justify-between items-center text-sm font-bold">
                                            <div className="flex items-center gap-2"><i data-lucide="lightbulb" className="w-4 h-4 text-yellow-400"></i> This Week</div>
                                            <i data-lucide="chevron-right" className="w-4 h-4 text-gray-500"></i>
                                        </div>
                                        <div className="text-xs text-gray-400 flex items-center gap-2">
                                            💸 You spent ₹0 this week
                                        </div>
                                    </div>
                                </div>

                                <div className="mt-8 px-6 font-bold text-lg">Weekly Spending</div>
                                <div className="mt-2 mx-4 bg-[#111] rounded-2xl h-24 border border-white/5 flex items-center justify-center">
                                    <div className="w-16 h-16 bg-neonPurple rounded-2xl flex justify-center items-center shadow-[0_0_20px_rgba(139,92,246,0.4)] animate-pulseSlow cursor-pointer">
                                        <i data-lucide="plus" className="w-8 h-8"></i>
                                    </div>
                                </div>

                                {/* Bottom Nav */}
                                <div className="absolute bottom-0 w-full h-16 glass border-t border-white/10 flex justify-between items-center px-6 rounded-b-[2.5rem]">
                                    <div className="flex flex-col items-center text-neonPurple"><i data-lucide="layout-grid" className="w-5 h-5 mb-1"></i><span className="text-[10px] font-bold">Home</span></div>
                                    <div className="flex flex-col items-center text-gray-500"><i data-lucide="receipt" className="w-5 h-5 mb-1"></i><span className="text-[10px]">Ledger</span></div>
                                    <div className="flex flex-col items-center text-gray-500"><i data-lucide="users" className="w-5 h-5 mb-1"></i><span className="text-[10px]">Splits</span></div>
                                    <div className="flex flex-col items-center text-gray-500"><i data-lucide="pie-chart" className="w-5 h-5 mb-1"></i><span className="text-[10px]">Stats</span></div>
                                    <div className="flex flex-col items-center text-gray-500"><i data-lucide="settings" className="w-5 h-5 mb-1"></i><span className="text-[10px]">Settings</span></div>
                                </div>
                            </div>
                        </motion.div>
                    </div>
                </section>
            );
        };

        const BentoFeatures = () => {
            const features = [
                { title: "Smart Splitting", desc: "Split expenses flawlessly with friends. Real-time updates and balance tracking.", span: "col-span-12 md:col-span-7", h: "md:h-[350px]", icon: "users" },
                { title: "Zero Ads", desc: "Clean UI always. Focus entirely on your financial journey without distractions.", span: "col-span-12 md:col-span-5", h: "md:h-[350px]", icon: "shield-check" },
                { title: "Advanced Ledgers", desc: "Classify transactions precisely with custom categories seamlessly.", span: "col-span-12 md:col-span-5", h: "md:h-[350px]", icon: "wallet" },
                { title: "Insightful Analytics", desc: "Interactive charts for weekly and monthly spending to make informed decisions effortlessly.", span: "col-span-12 md:col-span-7", h: "md:h-[350px]", icon: "line-chart" }
            ];

            return (
                <section id="features" className="py-24 px-6 md:px-8 max-w-7xl mx-auto">
                    <div className="mb-20 text-center">
                        <h2 className="text-4xl md:text-5xl lg:text-6xl font-black mb-6">Powerful Features.<br /><span className="text-gray-500">Minimal Friction.</span></h2>
                        <p className="text-xl text-gray-400 max-w-2xl mx-auto">Everything you need to manage your personal finances, packed inside a sleek, distraction-free environment.</p>
                    </div>

                    <div className="grid grid-cols-12 gap-6">
                        {features.map((f, i) => (
                            <motion.div
                                key={i}
                                initial={{ opacity: 0, scale: 0.95, y: 30 }}
                                whileInView={{ opacity: 1, scale: 1, y: 0 }}
                                viewport={{ once: true, margin: "-50px" }}
                                transition={{ type: "spring", stiffness: 100, damping: 20, delay: i * 0.1 }}
                                whileHover={{ scale: 1.02 }}
                                className={`glass rounded-[2.5rem] p-8 md:p-10 relative overflow-hidden group ${f.span} ${f.h}`}
                            >
                                <div className="absolute -top-10 -right-10 p-8 opacity-0 group-hover:opacity-100 transition-all duration-700 pointer-events-none">
                                    <div className="w-48 h-48 rounded-full bg-neonPurple/20 blur-3xl absolute -z-10"></div>
                                </div>
                                <div className="relative z-10 flex flex-col h-full justify-between">
                                    <div className="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center border border-white/10 mb-6 group-hover:bg-neonPurple/10 transition-colors">
                                        <i data-lucide={f.icon} className="w-7 h-7 text-neonPurple"></i>
                                    </div>
                                    <div>
                                        <h3 className="text-2xl md:text-3xl font-bold mb-3">{f.title}</h3>
                                        <p className="text-lg text-gray-400 font-medium leading-relaxed">{f.desc}</p>
                                    </div>
                                </div>
                            </motion.div>
                        ))}
                    </div>
                </section>
            );
        };

        const HowItWorks = () => {
            const steps = [
                { num: "01", title: "Log It", desc: "Add expenses in seconds using our intuitive, category-first interface.", icon: "plus-circle" },
                { num: "02", title: "Split It", desc: "Instantly divide bills with friends. No more awkward math or screenshots.", icon: "users" },
                { num: "03", title: "Save It", desc: "Watch your net savings grow using interactive weekly smart insights.", icon: "trending-up" }
            ];
            return (
                <section className="py-24 px-6 md:px-8 max-w-7xl mx-auto border-t border-white/5">
                    <div className="text-center mb-16">
                        <h2 className="text-4xl md:text-5xl font-black mb-4">How it Works</h2>
                        <p className="text-gray-400 text-lg">Three steps to complete financial clarity.</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        {steps.map((s, i) => (
                            <motion.div
                                initial={{ opacity: 0, y: 20 }}
                                whileInView={{ opacity: 1, y: 0 }}
                                viewport={{ once: true, margin: "-50px" }}
                                transition={{ delay: i * 0.2 }}
                                key={i}
                                className="glass p-8 rounded-[2.5rem] relative overflow-hidden group"
                            >
                                <div className="text-6xl font-black text-white/5 absolute -top-2 right-4 group-hover:text-neonPurple/10 transition-colors">{s.num}</div>
                                <i data-lucide={s.icon} className="w-10 h-10 text-neonPurple mb-6"></i>
                                <h3 className="text-2xl font-bold mb-3">{s.title}</h3>
                                <p className="text-gray-400 leading-relaxed font-medium">{s.desc}</p>
                            </motion.div>
                        ))}
                    </div>
                </section>
            );
        };

        const PrivacyFirst = () => (
            <section id="privacy" className="py-24 px-6 md:px-8 max-w-7xl mx-auto">
                <div className="glass rounded-[3rem] p-8 md:p-16 flex flex-col md:flex-row items-center gap-12 relative overflow-hidden border border-neonGreen/20">
                    <div className="absolute top-0 right-0 w-64 h-64 bg-neonGreen/10 blur-[80px] rounded-full"></div>
                    <div className="md:w-1/2 relative z-10">
                        <div className="w-16 h-16 rounded-2xl bg-neonGreen/10 flex items-center justify-center mb-6 border border-neonGreen/20">
                            <i data-lucide="shield-check" className="w-8 h-8 text-neonGreen"></i>
                        </div>
                        <h2 className="text-4xl md:text-5xl font-black mb-6">Your Data.<br />Your Device.</h2>
                        <p className="text-xl text-gray-400 leading-relaxed mb-6 font-medium">
                            We built SpendByte on a foundation of absolute privacy.
                            <strong className="text-white"> NO CLOUD. NO TRACKING. NO ADS.</strong><br /><br />
                            Your financial data never leaves your smartphone. Everything is processed locally via internal storage, ensuring your money stays your business.
                        </p>
                        <div className="flex flex-wrap gap-4">
                            <span className="px-5 py-2 rounded-full border border-neonGreen/30 text-neonGreen text-sm font-bold bg-neonGreen/5">100% Local</span>
                            <span className="px-5 py-2 rounded-full border border-white/10 text-gray-300 text-sm font-bold bg-white/5">AES-256 Ready</span>
                        </div>
                    </div>
                    <div className="md:w-1/2 w-full flex justify-center relative z-10 pt-8 md:pt-0">
                        <div className="relative w-full max-w-xs md:max-w-sm aspect-square glass rounded-full flex items-center justify-center border-neonGreen/10 shadow-[0_0_80px_rgba(16,185,129,0.1)]">
                            <i data-lucide="lock" className="w-20 h-20 text-neonGreen"></i>
                            <motion.div
                                animate={{ rotate: 360 }}
                                transition={{ repeat: Infinity, duration: 25, ease: "linear" }}
                                className="absolute inset-x-0 inset-y-0 border-2 border-dashed border-neonGreen/20 rounded-full"
                            />
                        </div>
                    </div>
                </div>
            </section>
        );

        const FAQSection = () => {
            const faqs = [
                { q: "Is SpendByte completely free?", a: "Yes. The core experience of SpendByte is completely free without ads, paywalls, or intrusive tracking." },
                { q: "Where is my data stored?", a: "All data is securely stored purely locally on your smartphone's internal database. It never touches a remote server." },
                { q: "Can I split expenses with people who don't have the app?", a: "Absolutely. You can log and track splits manually on your end or export the ledger entry to share with them externally." },

            return (
                <section id="faq" className="py-24 px-6 md:px-8 max-w-3xl mx-auto border-t border-white/5">

                            <div key={i} className="glass rounded-2xl overflow-hidden border border-white/5 transition-colors hover:border-white/10">
                                <button
                                    onClick={() => setOpenIndex(openIndex === i ? null : i)}
                                    className="w-full text-left px-6 py-6 flex justify-between items-center font-bold text-lg md:text-xl"
                                >
                                    {faq.q}
                                    <i data-lucide={openIndex === i ? "minus" : "plus"} className="w-5 h-5 text-neonPurple flex-shrink-0 ml-4"></i>
                                </button>
                                <AnimatePresence>
                                    {openIndex === i && (
                                        <motion.div
                                            initial={{ height: 0, opacity: 0 }}
                                            animate={{ height: "auto", opacity: 1 }}

                                        >
                                            {faq.a}
                                        </motion.div>
                                    )}
                                </AnimatePresence>
                            </div>
                        ))}
                    </div>
                </section>

        const DownloadSection = () => {
            return (

                            >
                                <span className="relative z-10 text-center">Download APK (v1.2.0)</span>
                                <i data-lucide="download" className="w-6 h-6 relative z-10"></i>
                            </motion.button>
                        </a>

                        <div className="flex flex-col md:flex-row flex-wrap justify-center items-center gap-6 mt-16 text-gray-500 font-bold text-sm tracking-wide">
                            <span className="flex items-center gap-2"><i data-lucide="server" className="w-5 h-5 text-neonGreen"></i> LOCAL STORAGE ONLY</span>
